entry_script: scripts/scatac_batch_latent.py
python_env: project-configured
summary: Run scATAC latent diagnosis or optional Harmony correction on an LSI-based representation, then build a graph, clusters, and UMAP.
methods:
  none:
    description: Keep the current LSI manifold, build the graph, and use it to diagnose sample structure without correction.
  harmony:
    description: Apply Harmony on X_lsi before rebuilding neighbors, Leiden clusters, and UMAP.
defaults:
  method: none
  use_rep: auto
  n_components: 50
  n_neighbors: 15
  leiden_resolution: 0.5
  cluster_key: leiden
  harmony_theta: 2.0
  umap_min_dist: 0.3
  random_state: 0
cli:
  required:
    - --input
    - --output
    - --batch-key
  optional:
    - --method {none,harmony}
    - --use-rep {auto,X_lsi,X_lsi_harmony}
    - --label-key <obs-column>
    - --n-components <int>
    - --n-neighbors <int>
    - --leiden-resolution <float>
    - --cluster-key <obs-column>
    - --harmony-theta <float>
    - --umap-min-dist <float>
    - --random-state <int>
    - --skip-umap
output_contract:
  main_h5ad: processed.h5ad
  report: report.md
  result: result.json
  tables:
    - tables/batch_sizes.csv
    - tables/integration_metrics.csv
    - tables/cell_embeddings.csv
    - tables/batch_cluster_counts.csv
  figures:
    - figures/umap_by_batch.png
    - figures/umap_by_cluster.png
    - figures/umap_by_label.png
