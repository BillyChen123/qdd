name: qdd-skill-core
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.9
  - pip
  - numpy=1.26.4
  - pandas=2.3.2
  - scipy=1.13.1
  - scikit-learn=1.6.1
  - matplotlib=3.9.4
  - seaborn=0.13.2
  - pyyaml=6.0.2
  - numba=0.60.0
  - anndata=0.10.9
  - scanpy=1.10.0
  - squidpy=1.6.1
  - scvelo=0.3.4
  - pydeseq2=0.4.12
  - gseapy=1.1.12
  - python-igraph=0.11.9
  - leidenalg
  - pip:
      - cellxgene-census==1.15.0
      - harmonypy==2.0.0
      - scanorama>=1.7,<1.8
      - bbknn>=1.6,<1.7
      - scib==1.1.5

# Current shipped domain skills do not require R packages.
# Keep R out of the default env until an actual R-backed skill lands.

# Intentionally excluded for now:
# - decoupler: conflicts with the current torch/numpy-compatible stack in qdd-skill-core
# - liana: not yet wired into a shipped executor skill
# - cellrank: not yet wired into a shipped executor skill
