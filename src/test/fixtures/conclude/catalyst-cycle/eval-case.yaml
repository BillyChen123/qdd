gates:
  gate1_feedback: >-
    Gate 1 feedback: a static catalyst-ranking paper would miss the strongest contribution. Emphasize that operando state conversion explains the selectivity/deactivation trade-off and that pulsed regeneration turns this dynamic model into a stable operating strategy. De-emphasize the screening leaderboard. Explain the new Results logic and wait without writing story.md.
  gate1_acceptance: >-
    Gate 1 accepted. Write the complete story as prediction of a promising precursor, operando evidence that its active state is transient, and reactor validation that state cycling sustains performance.
  gate2_feedback: >-
    Gate 2: revise the actual manuscript. Open Results with the discrepancy between static stability predictions and measured deactivation, then use operando evidence to resolve it before introducing pulsed regeneration. Integrate the cycling figure and a quantitative performance table, and keep mechanistic language proportional to observational evidence.
  gate2_acceptance: >-
    Gate 2 accepted after revision. Stop before TeX rendering.
reviewer_focus:
  - Check that the static calculation is presented as precursor screening, not proof of the active catalyst state.
  - Check the reported 82 to 61 percent continuous-mode decline and 80 percent tenth-cycle pulsed performance against underlying outputs.
  - Check that the cycling figure caption and prose reflect repeated recovery in pulsed mode rather than monotonic stability.
  - Check that the provided figure is one unpanelled 10 by 6 color raster with repeated green-yellow pulsed bands and red declining bands; it has no axes, labels, trajectories, or open and filled symbols.
